# Netlify configuration for Rexpand · 睿思班
# SPA fallback: any unknown route serves /index.html so the JS router takes over.

[build]
  publish = "."

# ---- Headers ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ---- Redirects / Rewrites ----
# Static files served as-is.  Any unknown route falls through to /index.html
# (200 = rewrite, not 301 redirect — preserves the requested URL for the JS router).

[[redirects]]
  from = "/sitemap.xml"
  to   = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to   = "/robots.txt"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
