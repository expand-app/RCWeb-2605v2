name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy Environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage deployable files
        run: |
          mkdir -p dist
          cp index.html dist/
          cp robots.txt dist/
          cp sitemap.xml dist/
          mkdir -p dist/media
          cp media/food.mp4 dist/media/
          cp media/food-*.png dist/media/
          cp media/meetfood-logo.png dist/media/
          cp -r media/team dist/media/
          echo "--- dist tree ---"
          find dist -maxdepth 3 -type f | sort
          du -sh dist

      - name: Set environment variables
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            ENVIRONMENT="production"
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV

          if [[ "$ENVIRONMENT" == "staging" ]]; then
            echo "OSS_BUCKET=staging-rexpand-official-website" >> $GITHUB_ENV
            echo "CDN_DOMAINS=http://staging.rexpandcareer.com/" >> $GITHUB_ENV
          else
            echo "OSS_BUCKET=rexpand-official-website" >> $GITHUB_ENV
            echo "CDN_DOMAINS=https://www.rexpandcareer.com/ https://rexpandcareer.com/" >> $GITHUB_ENV
          fi

      - name: Upload build to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ env.OSS_BUCKET }}
          OSS_ENDPOINT: "oss-cn-hangzhou.aliyuncs.com"
        run: |
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil config -e $OSS_ENDPOINT -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET
          ossutil cp -r -f ./dist/ oss://$OSS_BUCKET/
          # HTML shell must always revalidate so a new deploy shows up immediately
          # instead of being served from a stale browser/CDN cache.
          ossutil cp -f --meta "Cache-Control:no-cache" ./dist/index.html oss://$OSS_BUCKET/index.html
          # Drop a stale page left from the old multi-page export so /about
          # falls through to the SPA (index.html) like every other route.
          ossutil rm oss://$OSS_BUCKET/about.html -f || true

      - name: Refresh Aliyun CDN cache
        env:
          CDN_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          CDN_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
        run: |
          cd $HOME
          curl -L -o aliyun-cli-linux-latest-amd64.tgz https://github.com/aliyun/aliyun-cli/releases/download/v3.0.226/aliyun-cli-linux-3.0.226-amd64.tgz
          tar xzvf aliyun-cli-linux-latest-amd64.tgz
          sudo cp aliyun /usr/local/bin
          sudo chmod +x /usr/local/bin/aliyun
          aliyun version

          aliyun configure set \
            --profile AkProfile \
            --mode AK \
            --access-key-id $CDN_ACCESS_KEY_ID \
            --access-key-secret $CDN_ACCESS_KEY_SECRET \
            --region cn-hangzhou

          # One-time: SPA fallback so client routes return HTTP 200 (not 404).
          # Known routes are rewritten to /index.html at origin; the JS router
          # reads the original path. Real files (anything with a "." extension)
          # never match this regex, so static assets are untouched.
          SPA_FUNCTIONS='[{"functionName":"back_to_origin_url_rewrite","functionArgs":[{"argName":"source_url","argValue":"^/(offer|cases|background|resources|about|replay|article|legal)(/.*)?$"},{"argName":"target_url","argValue":"/index.html"},{"argName":"flag","argValue":"break"}]}]'
          for url in $CDN_DOMAINS; do
            host=$(echo "$url" | sed -E 's#^https?://##; s#/.*$##')
            echo "Configuring SPA fallback rewrite for $host"
            aliyun dcdn BatchSetDcdnDomainConfigs --DomainNames "$host" --Functions "$SPA_FUNCTIONS"
          done

          for domain in $CDN_DOMAINS; do
            for path in "*" "about" "about.html"; do
              aliyun dcdn RefreshDcdnObjectCaches \
                --region cn-hangzhou \
                --ObjectPath "${domain}${path}" \
                --ObjectType File
            done
          done

      - name: Notify deploy result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : status === 'cancelled' ? '⚠️' : '❌';
            const env = process.env.ENVIRONMENT || 'production';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `${emoji} **Deploy ${status}** — \`${env}\``,
              '',
              `- Commit: \`${sha.substring(0, 7)}\``,
              `- Run: ${runUrl}`,
            ].join('\n');
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            if (prs.data.length === 0) {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body,
              });
              return;
            }
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
