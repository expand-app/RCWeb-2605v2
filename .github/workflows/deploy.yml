name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy Environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage deployable files
        run: |
          mkdir -p dist
          cp index.html dist/
          cp robots.txt dist/
          cp sitemap.xml dist/
          mkdir -p dist/media
          cp media/food.mp4 dist/media/
          cp media/food-*.png dist/media/
          cp media/meetfood-logo.png dist/media/
          cp -r media/team dist/media/
          cp -r media/avatars dist/media/
          # Pre-render per-route static HTML so shared deep links get the right
          # title/description/og:image for crawlers that don't run JS (WeChat etc.)
          node scripts/og-pages.mjs
          echo "--- dist tree ---"
          find dist -maxdepth 3 -type f | sort
          du -sh dist

      - name: Set environment variables
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            ENVIRONMENT="production"
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV

          if [[ "$ENVIRONMENT" == "staging" ]]; then
            echo "OSS_BUCKET=staging-rexpand-official-website" >> $GITHUB_ENV
            echo "CDN_DOMAINS=http://staging.rexpandcareer.com/" >> $GITHUB_ENV
          else
            echo "OSS_BUCKET=rexpand-official-website" >> $GITHUB_ENV
            echo "CDN_DOMAINS=https://www.rexpandcareer.com/ https://rexpandcareer.com/" >> $GITHUB_ENV
          fi

      - name: Upload build to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ env.OSS_BUCKET }}
          OSS_ENDPOINT: "oss-cn-hangzhou.aliyuncs.com"
        run: |
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil config -e $OSS_ENDPOINT -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET
          ossutil cp -r -f ./dist/ oss://$OSS_BUCKET/
          # HTML shells (root index.html + every pre-rendered per-route *.html)
          # must always revalidate so a new deploy shows up immediately instead of
          # being served from a stale browser/CDN cache.
          ossutil cp -r -f --include "*.html" --meta "Cache-Control:no-cache" ./dist/ oss://$OSS_BUCKET/
          # Enable bucket versioning so accidental deletes/overwrites can be
          # rolled back. Idempotent. Not retroactive — only protects changes
          # made from now on. Re-run each deploy keeps it on (self-healing).
          ossutil bucket-versioning --method put oss://$OSS_BUCKET enabled || true

      - name: Refresh Aliyun CDN cache
        env:
          CDN_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          CDN_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
        run: |
          cd $HOME
          curl -L -o aliyun-cli-linux-latest-amd64.tgz https://github.com/aliyun/aliyun-cli/releases/download/v3.0.226/aliyun-cli-linux-3.0.226-amd64.tgz
          tar xzvf aliyun-cli-linux-latest-amd64.tgz
          sudo cp aliyun /usr/local/bin
          sudo chmod +x /usr/local/bin/aliyun
          aliyun version

          aliyun configure set \
            --profile AkProfile \
            --mode AK \
            --access-key-id $CDN_ACCESS_KEY_ID \
            --access-key-secret $CDN_ACCESS_KEY_SECRET \
            --region cn-hangzhou

          # Ensure clean-URL -> .html rewrites on both domains so crawlers
          # fetching /offer, /cases, /background/quant, /legal/privacy, ... get
          # the pre-rendered per-page .html (right title/description/og).
          #   ^/([^/.]+)$ -> /$1.html        — single-segment (captured, works)
          #   plus a LITERAL rule per known two-segment path: the captured form
          #   ^/background/([^/.]+)$ never matched on this DCDN, so each nested
          #   slug gets its own zero-capture rule "^/<path>$ -> /<path>.html".
          # Idempotent: grep -F for each rule's exact regex; only add if absent.
          NESTED="background/data-analytics background/data-science background/quant background/investment-banking background/software-engineering legal/privacy legal/user-terms legal/mentor-terms"
          for d in www.rexpandcareer.com rexpandcareer.com; do
            cfg=$(aliyun dcdn DescribeDcdnDomainConfigs --DomainName "$d" --FunctionNames host_redirect 2>/dev/null)
            echo "$cfg" | grep -qF '^/([^/.]+)$' || aliyun dcdn BatchSetDcdnDomainConfigs --DomainNames "$d" --Functions '[{"functionName":"host_redirect","functionArgs":[{"argName":"regex","argValue":"^/([^/.]+)$"},{"argName":"replacement","argValue":"/$1.html"},{"argName":"flag","argValue":"break"}]}]' || true
            for p in $NESTED; do
              re="^/${p}\$"   # bash escapes $ -> literal $; this becomes "^/<path>$"
              rep="/${p}.html"
              echo "$cfg" | grep -qF "$re" || aliyun dcdn BatchSetDcdnDomainConfigs --DomainNames "$d" --Functions "[{\"functionName\":\"host_redirect\",\"functionArgs\":[{\"argName\":\"regex\",\"argValue\":\"$re\"},{\"argName\":\"replacement\",\"argValue\":\"$rep\"},{\"argName\":\"flag\",\"argValue\":\"break\"}]}]" || true
            done
          done
          # One-off: drop broad/captured rules that turned out unreliable. The
          # zero-capture literal rules above supersede them.
          for id in 499118684882944 499119391651840 499122086494208 499122090661888; do
            aliyun dcdn DeleteDcdnSpecificConfig --DomainName www.rexpandcareer.com --ConfigId "$id" || true
          done
          for id in 499118691213312 499119395856384 499122094891008 499122099087360; do
            aliyun dcdn DeleteDcdnSpecificConfig --DomainName rexpandcareer.com --ConfigId "$id" || true
          done

          # Directory refresh purges every cached object under each domain so the
          # new .html pages (and the rewrite) take effect immediately. Runs after
          # the rules are set; OSS is strongly consistent for object PUTs.
          for url in $CDN_DOMAINS; do
            aliyun dcdn RefreshDcdnObjectCaches \
              --region cn-hangzhou \
              --ObjectPath "$url" \
              --ObjectType Directory
          done
          ossutil config -e oss-cn-hangzhou.aliyuncs.com -i "$CDN_ACCESS_KEY_ID" -k "$CDN_ACCESS_KEY_SECRET" >/dev/null 2>&1 || true
          # TEMP: dump host_redirect to verify whether the literal nested rules
          # were actually persisted by BatchSetDcdnDomainConfigs.
          {
            for d in www.rexpandcareer.com rexpandcareer.com; do
              echo "### host_redirect $d :"
              aliyun dcdn DescribeDcdnDomainConfigs --DomainName "$d" --FunctionNames "host_redirect" 2>&1 || true
              echo
            done
          } > /tmp/diag-hr.txt 2>&1
          ossutil cp -f /tmp/diag-hr.txt "oss://${OSS_BUCKET}/_diag-hr.txt" --meta "Cache-Control:no-cache" || true

      - name: Notify deploy result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : status === 'cancelled' ? '⚠️' : '❌';
            const env = process.env.ENVIRONMENT || 'production';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `${emoji} **Deploy ${status}** — \`${env}\``,
              '',
              `- Commit: \`${sha.substring(0, 7)}\``,
              `- Run: ${runUrl}`,
            ].join('\n');
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            if (prs.data.length === 0) {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body,
              });
              return;
            }
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
